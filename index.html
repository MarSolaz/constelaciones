<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constelaciones Fugaces</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050a19;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        /* Botón Minimalista */
        #audio-ctrl {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            border-radius: 2px;
            z-index: 10;
            outline: none;
        }

        #audio-ctrl:hover {
            border-color: rgba(255, 255, 255, 0.7);
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        #ui {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <button id="audio-ctrl">SONIDO: OFF</button>
    <div id="ui">Uní las estrellas para crear constelaciones efímeras</div>
    <canvas id="sky"></canvas>

    <audio id="musica" loop>
        <source src="grillo.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d');
        const musica = document.getElementById('musica');
        const btnAudio = document.getElementById('audio-ctrl');

        let stars = [];
        let connections = [];
        let selectedStar = null;
        let audioIniciado = false;

        // --- CONFIGURACIÓN ---
        const STAR_COUNT = 80;        // Puedes subirlo a 150 si quieres más cantidad
        const LINE_LIFESPAN = 30000;  // 30 segundos
        const STAR_REFRESH = 60000;   // 1 minuto

        function toggleAudio() {
            if (musica.paused) {
                musica.play().catch(() => {});
                btnAudio.innerText = "SONIDO: ON";
            } else {
                musica.pause();
                btnAudio.innerText = "SONIDO: OFF";
            }
        }

        btnAudio.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleAudio();
        });

        class Star {
            constructor() {
                this.reset();
                // Cada estrella tiene su propia velocidad de parpadeo y halo
                this.twinkleSpeed = 0.001 + Math.random() * 0.003;
                this.haloSize = Math.random() * 8 + 4;
                this.phase = Math.random() * Math.PI * 2;
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.8 + 0.4;
                this.opacity = 0;
                this.fadeSpeed = 0.005 + Math.random() * 0.005;
                this.state = 'fadingIn';
                this.lastChange = Date.now();
            }

            update() {
                let now = Date.now();
                
                if (this.state === 'visible' && now - this.lastChange > STAR_REFRESH) {
                    this.state = 'fadingOut';
                }

                if (this.state === 'fadingOut') {
                    this.opacity -= this.fadeSpeed;
                    if (this.opacity <= 0) this.reset();
                } else if (this.state === 'fadingIn') {
                    this.opacity += this.fadeSpeed;
                    if (this.opacity >= 1) {
                        this.opacity = 1;
                        this.state = 'visible';
                    }
                }
            }

            draw() {
                // Cálculo del titileo (twinkle)
                let flicker = this.opacity * (0.7 + Math.sin(Date.now() * this.twinkleSpeed + this.phase) * 0.3);

                ctx.save();
                ctx.beginPath();
                
                // Efecto de Halo
                ctx.shadowBlur = this.haloSize;
                ctx.shadowColor = `rgba(255, 255, 255, ${flicker})`;
                
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${flicker})`;
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push(new Star());
            }
            animate();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);

        function animate() {
            // Fondo azul noche muy profundo
            ctx.fillStyle = '#050a19';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let now = Date.now();

            // Dibujar Conexiones
            for (let i = connections.length - 1; i >= 0; i--) {
                let c = connections[i];
                let age = now - c.timestamp;

                if (age > LINE_LIFESPAN) {
                    connections.splice(i, 1);
                } else {
                    let alpha = 0.3;
                    if (age > LINE_LIFESPAN - 5000) {
                        alpha = (LINE_LIFESPAN - age) / 5000 * 0.3;
                    }
                    ctx.beginPath();
                    ctx.moveTo(c.p1.x, c.p1.y);
                    ctx.lineTo(c.p2.x, c.p2.y);
                    ctx.strokeStyle = `rgba(200, 230, 255, ${alpha})`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }

            // Dibujar Estrellas
            stars.forEach(s => {
                s.update();
                s.draw();
            });

            requestAnimationFrame(animate);
        }

        function handleInteraction(x, y) {
            // Iniciar audio en la primera interacción si está apagado
            if (!audioIniciado) {
                musica.play();
                btnAudio.innerText = "SONIDO: ON";
                audioIniciado = true;
            }

            for (let star of stars) {
                let dist = Math.hypot(star.x - x, star.y - y);
                if (dist < 25) { // Radio de colisión
                    if (selectedStar && selectedStar !== star) {
                        connections.push({
                            p1: { x: selectedStar.x, y: selectedStar.y },
                            p2: { x: star.x, y: star.y },
                            timestamp: Date.now()
                        });
                        selectedStar = null;
                    } else {
                        selectedStar = star;
                    }
                    return;
                }
            }
            selectedStar = null;
        }

        canvas.addEventListener('mousedown', e => handleInteraction(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        init();
    </script>
</body>
</html>
